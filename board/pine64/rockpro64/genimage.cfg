image boot.vfat {
	vfat {
		file rockchip/rk3399-rockpro64.dtb {
			image = "rk3399-rockpro64.dtb"
		}
		file EFI {
			image = "efi-part/EFI"
		}
		files = {
			"Image"
		}
	}
	size = 64M
}

image sdcard.img {

	hdimage {
		gpt = true
	}

	partition loader1 {
		image = "idbloader.img"
		offset = 32K
	}

	partition loader2 {
		image = "u-boot.itb"
		offset = 8M
	}

	partition boot {
		partition-type = 0xEF
		bootable = "true"
		image = "boot.vfat"
		offset = 16M
	}

	partition rootfs {
		partition-type = 0x83
		image = "rootfs.ext4"
	}
}
